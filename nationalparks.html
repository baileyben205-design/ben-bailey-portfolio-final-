<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Parks Trivia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: "Times New Roman", Times, serif;
            background: #a9d6ff; /* light blue */
            margin: 0;
            color: #1a2b3c;
        }

        .navbar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(6px);
        }

        .game-box {
            max-width: 650px;
            margin: 3rem auto;
            padding: 2rem;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        #answers button {
            transition: 0.2s;
        }

        #answers button:hover {
            transform: scale(1.02);
        }

        #timerBar {
            transition: width 0.3s ease;
        }

       .site-footer {
    background: #a9d6ff;
    border-top: 1px solid #7fbce6;
    padding: 12px 0;
}
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
      
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            Menu
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="fromscratch.html">National Parks</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container game-box">

    <h1>National Parks Trivia</h1>

    <div class="progress mb-3">
        <div id="timerBar" class="progress-bar" style="width:100%"></div>
    </div>

    <h4 id="question">Press Start to Play</h4>

    <div id="answers" class="mt-3"></div>

    <p id="feedback" class="fw-bold mt-3"></p>

    <p id="score">Score: 0</p>
    <p id="highScore">High Score: 0</p>
    <p id="progress"></p>

    <button onclick="startGame()" class="btn btn-primary mt-3">
        Start / Restart
    </button>

</div>

<script>
const TOTAL_QUESTIONS = 5;
const TIME_LIMIT = 10;

/* ✅ FULL QUESTION BANK RESTORED (ALL 15 QUESTIONS) */
const questions = [
    { q: "Old Faithful geyser is located in which region of Yellowstone?", a: ["Upper Geyser Basin","Mammoth Hot Springs","Lamar Valley","Norris Basin"], correct: "Upper Geyser Basin" },
    { q: "Which national park contains the Bright Angel Trail?", a: ["Zion","Grand Canyon","Bryce Canyon","Arches"], correct: "Grand Canyon" },
    { q: "Half Dome is composed primarily of which type of rock?", a: ["Granite","Limestone","Sandstone","Basalt"], correct: "Granite" },
    { q: "Angels Landing hike is famous for what feature?", a: ["Chains for support","Underground tunnels","Waterfalls","Glacier crossings"], correct: "Chains for support" },
    { q: "Delicate Arch is located in which park region?", a: ["Devils Garden","Windows Section","Courthouse Towers","Fiery Furnace"], correct: "Windows Section" },

    { q: "Denali was formerly known by what name?", a: ["Mount McKinley","Mount Logan","Mount St. Elias","Mount Foraker"], correct: "Mount McKinley" },
    { q: "Which park protects the world's largest trees by volume?", a: ["Sequoia","Redwood","Yosemite","Olympic"], correct: "Sequoia" },
    { q: "Bryce Canyon hoodoos are primarily formed through what process?", a: ["Frost wedging","Volcanic activity","Glacial carving","Wind erosion"], correct: "Frost wedging" },
    { q: "Which ecosystem dominates Everglades National Park?", a: ["Subtropical wetland","Desert scrub","Temperate rainforest","Alpine tundra"], correct: "Subtropical wetland" },
    { q: "Acadia National Park is located on which island?", a: ["Mount Desert Island","Long Island","Kodiak Island","San Juan Island"], correct: "Mount Desert Island" },

    { q: "Mammoth Cave is known for being what?", a: ["Longest cave system in the world","Deepest cave in the U.S.","Largest single cavern","Oldest cave"], correct: "Longest cave system in the world" },
    { q: "Olympic National Park contains which rare ecosystem in the U.S.?", a: ["Temperate rainforest","Mangrove forest","Savanna grassland","Coral reef"], correct: "Temperate rainforest" },
    { q: "Glacier National Park is located along the border with which country?", a: ["Canada","Mexico","Russia","Greenland"], correct: "Canada" },
    { q: "Arches National Park sits within which desert?", a: ["Colorado Plateau Desert","Mojave Desert","Sonoran Desert","Great Basin Desert"], correct: "Colorado Plateau Desert" },
    { q: "Badlands National Park is known for which type of formations?", a: ["Eroded buttes and pinnacles","Sand dunes","Volcanic craters","Glaciers"], correct: "Eroded buttes and pinnacles" }
];

let currentQuestion = 0;
let score = 0;
let shuffledQuestions = [];
let timer;
let timeLeft = TIME_LIMIT;

function shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function startGame() {
    score = 0;
    currentQuestion = 0;

    shuffledQuestions = shuffle(questions).slice(0, TOTAL_QUESTIONS);

    document.getElementById("score").textContent = "Score: 0";
    document.getElementById("feedback").textContent = "";

    loadHighScore();
    loadQuestion();
}

function loadQuestion() {
    clearInterval(timer);
    timeLeft = TIME_LIMIT;

    if (currentQuestion >= shuffledQuestions.length) {
        endGame();
        return;
    }

    const q = shuffledQuestions[currentQuestion];

    document.getElementById("question").textContent = q.q;
    document.getElementById("progress").textContent =
        `Question ${currentQuestion + 1} of ${shuffledQuestions.length}`;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    shuffle(q.a).forEach(option => {
        const btn = document.createElement("button");
        btn.className = "btn btn-outline-primary w-100 my-2";
        btn.textContent = option;
        btn.onclick = () => checkAnswer(option);
        answersDiv.appendChild(btn);
    });

    startTimer();
}

function startTimer() {
    updateTimer();

    timer = setInterval(() => {
        timeLeft--;
        updateTimer();

        if (timeLeft <= 0) {
            clearInterval(timer);
            autoFail();
        }
    }, 1000);
}

function updateTimer() {
    const bar = document.getElementById("timerBar");
    const percent = (timeLeft / TIME_LIMIT) * 100;

    bar.style.width = percent + "%";
    bar.textContent = `Time Left: ${timeLeft}s`;
    bar.style.background = timeLeft <= 3 ? "#dc3545" : "#0d6efd";
}

function checkAnswer(answer) {
    clearInterval(timer);

    const correct = shuffledQuestions[currentQuestion].correct;
    const buttons = document.querySelectorAll("#answers button");

    buttons.forEach(btn => {
        btn.disabled = true;
        btn.classList.add(btn.textContent === correct ? "btn-success" : "btn-danger");
    });

    document.getElementById("feedback").textContent =
        answer === correct ? "Correct!" : `Correct answer: ${correct}`;

    if (answer === correct) score++;

    document.getElementById("score").textContent = "Score: " + score;

    nextQuestion();
}

function autoFail() {
    document.getElementById("feedback").textContent = "Time's up!";
    nextQuestion();
}

function nextQuestion() {
    currentQuestion++;
    setTimeout(loadQuestion, 1000);
}

function endGame() {
    clearInterval(timer);

    document.getElementById("question").textContent = "Game Over!";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("progress").textContent = "";

    document.getElementById("feedback").textContent =
        `Final Score: ${score} / ${shuffledQuestions.length}`;

    saveHighScore();
}

function saveHighScore() {
    let high = localStorage.getItem("highScore") || 0;

    if (score > high) {
        localStorage.setItem("highScore", score);
        high = score;
    }

    document.getElementById("highScore").textContent = "High Score: " + high;
}

function loadHighScore() {
    const high = localStorage.getItem("highScore") || 0;
    document.getElementById("highScore").textContent = "High Score: " + high;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<footer class="site-footer mt-4 py-3">
    <div class="container text-center">
        <small>© 2026 Benjamin D. Bailey. All rights reserved.</small>
    </div>
</footer>

</body>
</html>
